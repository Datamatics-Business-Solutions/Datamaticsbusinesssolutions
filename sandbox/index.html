<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Datamatics Business Solutions — Campaign management and lead generation platform" />
    <meta name="theme-color" content="#BA2027" />
    <title>Datamatics Business Solutions</title>
    <style>
      /* ─── Instant HTML-level splash ─────────────────────────────────────────
         Renders from byte zero before any JS downloads or executes.
         React removes #root-splash after its first paint (see main.tsx).
      ──────────────────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #fff; font-family: Inter, system-ui, sans-serif; }

      #root-splash {
        position: fixed; inset: 0;
        background: linear-gradient(135deg, #ffffff 0%, #fdf2f2 40%, #fff5f5 100%);
        z-index: 9998;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        animation: splashIn 180ms ease forwards;
      }
      @keyframes splashIn    { from { opacity: 0; } to { opacity: 1; } }
      @keyframes floatLogo   { 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-6px) scale(1.02); } }
      @keyframes barGrow     { 0%{width:0%} 30%{width:42%} 60%{width:70%} 85%{width:87%} 100%{width:92%} }
      @keyframes shimmerBar  { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
      @keyframes dotBounce   { 0%,80%,100%{transform:scale(0.55);opacity:0.35} 40%{transform:scale(1);opacity:1} }

      .sp-logo  { animation: floatLogo 2.4s ease-in-out infinite; margin-bottom: 28px; }
      .sp-title { font-size: 15px; font-weight: 600; color: #1E1E1E; letter-spacing: .01em; margin-bottom: 4px; }
      .sp-sub   { font-size: 11px; font-weight: 500; color: #9CA3AF; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 36px; }
      .sp-bar   { width: 200px; height: 3px; border-radius: 99px; background: rgba(186,32,39,.1); overflow: hidden; position: relative; }
      .sp-fill  { position: absolute; left: 0; top: 0; height: 100%; border-radius: 99px; background: linear-gradient(90deg,#BA2027,#D32F2F); animation: barGrow 2.5s cubic-bezier(.4,0,.2,1) forwards; }
      .sp-shine { position: absolute; inset: 0; background-image: linear-gradient(90deg,transparent 0%,rgba(255,255,255,.55) 50%,transparent 100%); background-size: 400px 100%; background-repeat: no-repeat; animation: shimmerBar 1.2s ease-in-out infinite; }
      .sp-dots  { display: flex; align-items: center; gap: 6px; margin-top: 22px; }
      .sp-dot   { width: 5px; height: 5px; border-radius: 50%; background: #BA2027; }
      .sp-dot:nth-child(1) { animation: dotBounce 1.2s ease-in-out 0s   infinite; }
      .sp-dot:nth-child(2) { animation: dotBounce 1.2s ease-in-out .18s infinite; }
      .sp-dot:nth-child(3) { animation: dotBounce 1.2s ease-in-out .36s infinite; }
    </style>
  </head>
  <body>

    <!-- Instant branded splash — visible from byte zero, before React boots.
         Removed with a 300ms fade-out in main.tsx after React's first paint. -->
    <div id="root-splash" aria-hidden="true">
      <div class="sp-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72.08 83.78"
             style="width:64px;height:64px;filter:drop-shadow(0 8px 24px rgba(186,32,39,.22))">
          <path fill="#BA2027" d="M10,9.86H41A31.05,31.05,0,0,1,72.08,40.91v0A31.05,31.05,0,0,1,41,72H10a0,0,0,0,1,0,0V9.86a0,0,0,0,1,0,0Z"/>
          <path fill="#fff"    d="M20.12,64H43.83A11.62,11.62,0,0,0,49,62.82a12.74,12.74,0,0,0,7.48-10.51,12.16,12.16,0,0,0-2.72-9.26,12.82,12.82,0,0,0-10.39-5H23.11s0-10.69,0-13.14a1.93,1.93,0,0,1,.5-1.46A2,2,0,0,1,25.06,23l18.08,0a9,9,0,0,1,3.08.53,7.39,7.39,0,0,1,4.88,7.17,21.94,21.94,0,0,1,5.09,2.72c0-.12.05-.24.08-.36a12.29,12.29,0,0,0-1.85-9.54,12.67,12.67,0,0,0-11.14-5.89H20.14A2.39,2.39,0,0,0,17.76,20V43.54H43.49A7.52,7.52,0,0,1,50.38,54.3a7.55,7.55,0,0,1-7.23,4.33L25,58.65a2,2,0,0,1-1.43-.51,1.91,1.91,0,0,1-.5-1.45c0-1.79,0-3.62,0-5.38V50.4H17.74V61.6A2.39,2.39,0,0,0,20.12,64Z"/>
        </svg>
      </div>
      <p class="sp-title">DatamaticsBPM</p>
      <p class="sp-sub">Client Portal</p>
      <div class="sp-bar">
        <div class="sp-fill"></div>
        <div class="sp-shine"></div>
      </div>
      <div class="sp-dots">
        <div class="sp-dot"></div>
        <div class="sp-dot"></div>
        <div class="sp-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
